{% extends 'base.html' %}
{% block title %}Register — vIXP{% endblock %}
{% block page_title %}Member Registration{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <p class="text-gray-400 mb-8">Complete the form below to apply for membership to the virtual Internet Exchange Point.</p>

    <form class="space-y-8">

        <!-- Organisation Details -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-white font-semibold text-lg mb-6 pb-3 border-b border-gray-800">Organisation Details</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Organisation Name</label>
                    <input type="text" placeholder="Acme Networks Pty Ltd"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">AS Number (ASN)</label>
                    <input type="text" placeholder="AS65000"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm font-mono focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
            </div>
        </div>

        <!-- Technical Details -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-white font-semibold text-lg mb-6 pb-3 border-b border-gray-800">Technical Details</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">IPv4 Peering Address</label>
                    <input type="text" placeholder="192.0.2.1"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm font-mono focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">IPv6 Peering Address</label>
                    <input type="text" placeholder="2001:db8::1"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm font-mono focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Max Prefixes (IPv4)</label>
                    <input type="number" placeholder="100"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Max Prefixes (IPv6)</label>
                    <input type="number" placeholder="50"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-sm text-gray-400 mb-2">PeeringDB URL</label>
                    <input type="text" placeholder="https://www.peeringdb.com/net/12345"
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5
                                  text-white placeholder-gray-500 text-sm focus:outline-none
                                  focus:border-blue-500 transition"/>
                </div>
            </div>

            <!-- Route Server -->
            <div class="mt-6">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 accent-blue-500"/>
                    <span class="text-sm text-gray-300">Connect to Route Server 1 (RS1)</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer mt-3">
                    <input type="checkbox" class="w-4 h-4 accent-blue-500"/>
                    <span class="text-sm text-gray-300">Connect to Route Server 2 (RS2)</span>
                </label>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex items-center gap-4">
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5
                           rounded-lg text-sm transition">
                Submit Application
            </button>
            <button type="reset"
                    class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold px-6 py-2.5
                           rounded-lg text-sm transition">
                Clear Form
            </button>
        </div>

    </form>
</div>
{% endblock %}
