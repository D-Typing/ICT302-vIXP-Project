{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}vIXP Registry{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col fixed h-full">
        <!-- Logo -->
        <div class="px-6 py-5 border-b border-gray-800">
            <span class="text-blue-400 font-bold text-xl tracking-wide">vIXP</span>
            <span class="text-gray-400 font-light text-xl"> Registry</span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="{% url 'dashboard' %}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                      {% if request.resolver_match.url_name == 'dashboard' %}
                        bg-blue-600 text-white
                      {% else %}
                        text-gray-400 hover:bg-gray-800 hover:text-white
                      {% endif %} transition">
                <!-- Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/>
                </svg>
                Dashboard
            </a>

            <a href="{% url 'register' %}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                      {% if request.resolver_match.url_name == 'register' %}
                        bg-blue-600 text-white
                      {% else %}
                        text-gray-400 hover:bg-gray-800 hover:text-white
                      {% endif %} transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
                Register
            </a>

            <a href="{% url 'documentation' %}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                      {% if request.resolver_match.url_name == 'documentation' %}
                        bg-blue-600 text-white
                      {% else %}
                        text-gray-400 hover:bg-gray-800 hover:text-white
                      {% endif %} transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
                </svg>
                Documentation
            </a>

            <a href="{% url 'peer_matrix' %}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                      {% if request.resolver_match.url_name == 'peer_matrix' %}
                        bg-blue-600 text-white
                      {% else %}
                        text-gray-400 hover:bg-gray-800 hover:text-white
                      {% endif %} transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
                Peer Matrix
            </a>
        </nav>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-800 text-xs text-gray-500">
            vIXP Registry v1.0
        </div>
    </aside>

    <!-- Main Content -->
    <div class="ml-64 flex-1 flex flex-col min-h-screen">
        <!-- Top Bar -->
        <header class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex items-center justify-between">
            <h1 class="text-lg font-semibold text-white">{% block page_title %}{% endblock %}</h1>
            <div class="flex items-center gap-4">
                <span class="text-xs bg-green-900 text-green-400 px-3 py-1 rounded-full font-medium">● IXP Online</span>
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold">A</div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
